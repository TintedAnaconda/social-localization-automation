version: "3.9"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: social-localization-n8n
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./input:/files/input
      - ./output:/files/output
      - ./logs:/files/logs
      - ./config:/files/config
      - ./templates:/files/templates
      - ./n8n/workflows:/files/workflows
    restart: unless-stopped